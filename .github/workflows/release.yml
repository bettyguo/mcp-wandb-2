name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # for creating GitHub releases
  id-token: write   # for PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject.toml version
        id: version
        run: |
          tag_ref="${GITHUB_REF##*/}"
          tag_version="${tag_ref#v}"
          file_version=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag_version=$tag_version"
          echo "file_version=$file_version"
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::tag $tag_ref does not match pyproject.toml version $file_version"
            exit 1
          fi
          echo "version=$file_version" >> "$GITHUB_OUTPUT"

      - name: Sync deps
        run: uv sync --extra dev --extra shap

      - name: Lint, type-check, test
        run: |
          uv run ruff check .
          uv run mypy src
          uv run pytest -q

      - name: Build distributions
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-wandb/${{ needs.build.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.build.outputs.version }}"
          tag="v${version}"
          notes=$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See CHANGELOG.md for details."
          fi
          gh release create "$tag" dist/* \
            --title "mcp-wandb $tag" \
            --notes "$notes"
